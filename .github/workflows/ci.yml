name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
      fail-fast: false
    name: Format, Lint & Tests (node ${{ matrix.node-version }})
    env:
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format check
        run: npm run format

      - name: Lint
        run: npm run eslint

      - name: Tests
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 1

  perf-tests:
    name: Performance tests (Artillery)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Health check & Performance tests (Artillery)
        env:
          NODE_ENV: production
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          node app.js &
          APP_PID=$!
          npx wait-on http://localhost:3000/health --timeout 10000
          curl --fail http://localhost:3000/health
          npx --yes artillery quick --count 10 --num 5 http://localhost:3000/health
          kill $APP_PID

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint-test

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Download coverage for SonarCloud
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: coverage-node-*
          path: coverage/
          merge-multiple: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  notify:
    needs: [lint-test, perf-tests, security]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      status: ${{ (needs.lint-test.result == 'success' && needs.perf-tests.result == 'success' && needs.security.result == 'success') && 'success' || 'failure' }}
      workflow_name: CI
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
