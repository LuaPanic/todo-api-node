name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    name: Format, Lint & Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format

      - name: Lint
        run: npm run eslint

      - name: Tests
        run: npx vitest run --coverage

      - name: Health check
        env:
          NODE_ENV: production
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          node app.js &
          APP_PID=$!
          npx wait-on http://localhost:3000/health-check --timeout 10000
          curl --fail http://localhost:3000/health-check
          kill $APP_PID
