name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
      fail-fast: false
    name: Format, Lint & Tests (node ${{ matrix.node-version }})
    env:
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format check
        run: npm run format

      - name: Lint
        run: npm run eslint

      - name: Tests
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 1

  perf-tests:
    name: Performance tests (Artillery)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Health check & Performance tests (Artillery)
        env:
          NODE_ENV: production
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          node app.js &
          APP_PID=$!
          npx wait-on http://localhost:3000/health --timeout 10000
          curl --fail http://localhost:3000/health
          npx --yes artillery quick --count 10 --num 5 http://localhost:3000/health
          kill $APP_PID

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint-test

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Download coverage for SonarCloud
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: coverage-node-*
          path: coverage/
          merge-multiple: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [lint-test, perf-tests, security]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.lint-test.result }}" == "success" && \
                "${{ needs.perf-tests.result }}" == "success" && \
                "${{ needs.security.result }}" == "success" ]]; then
            echo "severity=info" >> $GITHUB_OUTPUT
            echo "label=succes" >> $GITHUB_OUTPUT
          else
            echo "severity=error" >> $GITHUB_OUTPUT
            echo "label=echec" >> $GITHUB_OUTPUT
          fi
      - name: Send Discord notification
        uses: rjstone/discord-webhook-notify@v2
        with:
          severity: ${{ steps.status.outputs.severity }}
          username: GitHub CI
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK_URL }}
          text: "CI ${{ steps.status.outputs.label }} — ${{ github.ref_name }}"
          details: |
            Commit `${{ github.sha }}` par **${{ github.actor }}**
            lint-test: ${{ needs.lint-test.result }} | perf-tests: ${{ needs.perf-tests.result }} | security: ${{ needs.security.result }}
          footer: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
