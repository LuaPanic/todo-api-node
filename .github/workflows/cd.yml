name: CD

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: ${{ !env.ACT }}
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  perf-tests:
    name: Performance tests (Artillery)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Health check & Performance tests (Artillery)
        env:
          NODE_ENV: production
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          node app.js &
          APP_PID=$!
          npx wait-on http://localhost:3000/health --timeout 10000
          npx --yes artillery quick --count 10 --num 5 http://localhost:3000/health
          kill $APP_PID

  release-please:
    name: Release Please (automated changelog)
    runs-on: ubuntu-latest
    needs: [security, perf-tests]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445
        with:
          release-type: node

  deploy-staging:
    name: Deploy to staging
    needs: [security, perf-tests]
    if: github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: staging
      compose_project: staging
    secrets:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      API_KEY: ${{ secrets.API_KEY }}
      APP_PORT: ${{ secrets.APP_PORT }}

  deploy-production:
    name: Deploy to production
    needs: [security, perf-tests]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: production
      compose_project: production
    secrets:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      API_KEY: ${{ secrets.API_KEY }}
      APP_PORT: ${{ secrets.APP_PORT }}

  rollback:
    name: Rollback deployment
    runs-on: homelab
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rollback to previous image
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          APP_PORT: ${{ vars.APP_PORT }}
          ENV_NAME: ${{ github.event.inputs.environment }}
        run: |
          docker compose -p ${ENV_NAME} pull ghcr.io/${{ github.repository }}:main@$(
            docker image inspect ghcr.io/${{ github.repository }}:main \
              --format '{{index .RepoDigests 0}}' 2>/dev/null | head -1
          ) || true
          docker compose -p ${ENV_NAME} up -d --remove-orphans --force-recreate
          echo "Rollback to previous version complete ✅"

      - name: Smoke test after rollback
        run: |
          sleep 5
          curl --fail --retry 5 --retry-delay 3 \
            http://localhost:${APP_PORT:-3000}/health
          echo "Post-rollback smoke test passed ✅"
        env:
          APP_PORT: ${{ vars.APP_PORT }}

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result != 'skipped' || needs.deploy-production.result != 'skipped')

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS_STAGING: ${{ needs.deploy-staging.result }}
          STATUS_PROD: ${{ needs.deploy-production.result }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "No DISCORD_WEBHOOK_URL set, skipping notification"
            exit 0
          fi
          ICON="✅"
          if [ "$STATUS_PROD" = "failure" ] || [ "$STATUS_STAGING" = "failure" ]; then
            ICON="❌"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${ICON} CD Pipeline — ${{ github.repository }}\",
                \"description\": \"Branch: \`${{ github.ref_name }}\`\nCommit: \`${{ github.sha }}\`\nStaging: **${STATUS_STAGING}**\nProduction: **${STATUS_PROD}**\",
                \"color\": $([ \"$ICON\" = \"✅\" ] && echo 3066993 || echo 15158332),
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"
